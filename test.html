<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LuHe / miao~</title>

    <!-- Google Fonts - VT323 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />

    <style>
        :root {
            --bg-deep: #0a0505;
            --red-dark: #882222;
            --red-mid: #b43838;
            --red-bright: #c84040;
            --red-light: #e08080;
            --red-pale: #f0d8d8;
            --text-dim: rgba(200, 120, 120, 0.5);
            --text-mid: rgba(180, 100, 100, 0.7);
            --border-soft: rgba(180, 60, 60, 0.4);
            --border-glow: rgba(220, 70, 70, 0.7);
            --shadow-btn: 0 0 18px rgba(180, 35, 35, 0.35);
            --shadow-btn-hover: 0 0 30px rgba(210, 45, 45, 0.55);
            --glass-bg: rgba(25, 8, 8, 0.6);
            --glass-border: rgba(120, 35, 35, 0.35);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'VT323', "Microsoft YaHei", "PingFang SC", monospace, sans-serif;
            color: #fff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ==================== 背景画布 ==================== */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background:
                radial-gradient(ellipse at top right, rgba(80, 20, 20, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.7) 100%);
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(80, 30, 30, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(80, 30, 30, 0.06) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ==================== 左上角Logo ==================== */
        .logo {
            position: fixed;
            top: 32px;
            left: 24px;
            z-index: 10;
            font-size: 14px;
            letter-spacing: 1.5px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 2px;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }
        .logo.overlay-active {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo .dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            background: #c83c3c;
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 8px #c83c3c, 0 0 16px rgba(200, 50, 50, 0.4);
            animation: dotPulse 2.5s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,
            100% {
                box-shadow: 0 0 6px #c83c3c, 0 0 12px rgba(200, 50, 50, 0.3);
            }
            50% {
                box-shadow: 0 0 14px #e05050, 0 0 24px rgba(220, 60, 60, 0.6);
            }
        }
        .logo .luhe {
            color: #e8d0d0;
            transition: color 0.4s ease;
        }
        .logo .slash {
            color: #884444;
            margin: 0 1px;
        }
        .logo .miaow {
            color: #c85050;
            transition: color 0.4s ease;
        }
        .logo:hover .luhe {
            color: #f5e5e5;
        }
        .logo:hover .miaow {
            color: #e86868;
            text-shadow: 0 0 10px rgba(200, 50, 50, 0.5);
        }

        /* ==================== 右上角面板容器 ==================== */
        .top-right-panel {
            position: fixed;
            top: 28px;
            right: 28px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }
        .top-right-panel.overlay-active {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================== 音乐控制器 ==================== */
        .music-controller {
            display: flex;
            align-items: center;
            gap: 11px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 26px;
            padding: 7px 15px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            transition: all var(--transition-smooth);
            box-shadow: 0 2px 18px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }
        .music-controller:hover {
            border-color: rgba(170, 45, 45, 0.6);
            box-shadow: 0 4px 28px rgba(150, 25, 25, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transform: translateY(-1px);
        }

        .music-play-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(110, 28, 28, 0.6) 0%, rgba(70, 15, 15, 0.7) 100%);
            border: 1.5px solid rgba(180, 50, 50, 0.5);
            color: #f0d0d0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all var(--transition-smooth);
            flex-shrink: 0;
            outline: none;
            position: relative;
            box-shadow: 0 0 10px rgba(160, 30, 30, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            letter-spacing: 0;
        }
        .music-play-btn:hover {
            background: linear-gradient(135deg, rgba(150, 35, 35, 0.7) 0%, rgba(95, 20, 20, 0.8) 100%);
            border-color: rgba(220, 65, 65, 0.75);
            box-shadow: 0 0 20px rgba(200, 40, 40, 0.45), 0 0 40px rgba(180, 30, 30, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            color: #fff;
            transform: scale(1.06);
        }
        .music-play-btn:active {
            transform: scale(0.9);
            transition: transform 0.1s ease;
            box-shadow: 0 0 6px rgba(200, 40, 40, 0.3), inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .music-play-btn.playing {
            animation: musicPulse 2.4s ease-in-out infinite;
            border-color: rgba(215, 60, 60, 0.7);
            box-shadow: 0 0 16px rgba(200, 45, 45, 0.5), 0 0 32px rgba(180, 30, 30, 0.25);
            background: linear-gradient(135deg, rgba(140, 30, 30, 0.65) 0%, rgba(90, 18, 18, 0.75) 100%);
        }
        @keyframes musicPulse {
            0%,
            100% {
                box-shadow: 0 0 12px rgba(200, 45, 45, 0.4), 0 0 24px rgba(180, 30, 30, 0.2);
            }
            50% {
                box-shadow: 0 0 24px rgba(225, 55, 55, 0.7), 0 0 48px rgba(200, 40, 40, 0.35), 0 0 60px rgba(180, 30, 30, 0.15);
            }
        }
        .music-play-btn.playing:hover {
            box-shadow: 0 0 28px rgba(230, 60, 60, 0.75), 0 0 52px rgba(200, 40, 40, 0.4);
        }
        .music-play-btn .note-icon {
            display: inline-block;
            transition: all 0.35s ease;
            line-height: 1;
            font-style: normal;
        }
        .music-play-btn.playing .note-icon {
            animation: noteBounce 0.9s ease-in-out infinite;
        }
        @keyframes noteBounce {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            35% {
                transform: translateY(-4px) scale(1.1);
            }
            65% {
                transform: translateY(1px) scale(0.95);
            }
        }

        .volume-slider-wrap {
            display: flex;
            align-items: center;
            overflow: hidden;
            transition: all 0.4s ease;
            max-width: 80px;
            opacity: 1;
        }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 75px;
            height: 5px;
            border-radius: 3px;
            background: linear-gradient(90deg, #661a1a 0%, #a03535 60%, #c84040 100%);
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .volume-slider:hover {
            background: linear-gradient(90deg, #7a2020 0%, #b84040 60%, #d85050 100%);
            box-shadow: 0 0 8px rgba(200, 40, 40, 0.3);
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #f0a0a0 0%, #d06060 50%, #a03030 100%);
            border: 2px solid #c84040;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(200, 45, 45, 0.5), 0 2px 4px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .volume-slider::-webkit-slider-thumb:hover {
            background: radial-gradient(circle at 40% 35%, #f8b8b8 0%, #e07070 50%, #b83838 100%);
            border-color: #e06060;
            box-shadow: 0 0 18px rgba(220, 55, 55, 0.7), 0 2px 6px rgba(0, 0, 0, 0.35);
            transform: scale(1.15);
        }
        .volume-slider::-moz-range-thumb {
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #f0a0a0 0%, #d06060 50%, #a03030 100%);
            border: 2px solid #c84040;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(200, 45, 45, 0.5);
        }
        .volume-slider::-moz-range-track {
            height: 5px;
            border-radius: 3px;
            background: linear-gradient(90deg, #661a1a 0%, #a03535 60%, #c84040 100%);
        }

        /* ==================== 页面导航提示栏 ==================== */
        .page-nav-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 9px 15px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all var(--transition-smooth);
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }
        .page-nav-indicator:hover {
            border-color: rgba(160, 42, 42, 0.55);
            box-shadow: 0 4px 22px rgba(140, 22, 22, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transform: translateY(-1px);
        }
        .nav-dash {
            display: block;
            height: 2.8px;
            width: 18px;
            border-radius: 3px;
            background: rgba(150, 80, 80, 0.35);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }
        .nav-dash.active {
            width: 32px;
            height: 4px;
            background: #f5e8e8;
            box-shadow: 0 0 12px rgba(255, 220, 220, 0.75), 0 0 24px rgba(220, 150, 150, 0.4), 0 0 36px rgba(200, 80, 80, 0.2);
            border-radius: 4px;
        }
        .nav-dash:hover:not(.active) {
            background: rgba(200, 110, 110, 0.65);
            width: 23px;
            box-shadow: 0 0 8px rgba(200, 90, 90, 0.4);
        }
        .nav-dash.active:hover {
            box-shadow: 0 0 18px rgba(255, 225, 225, 0.9), 0 0 32px rgba(220, 150, 150, 0.55), 0 0 48px rgba(200, 80, 80, 0.3);
            width: 34px;
        }
        .nav-dash::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: all 0.5s ease;
            pointer-events: none;
        }
        .nav-dash:active::after {
            width: 44px;
            height: 44px;
            opacity: 0;
            transition: all 0s;
        }

        /* ==================== 左下角欢迎区 ==================== */
        .welcome-area {
            position: fixed;
            bottom: 80px;
            left: 24px;
            z-index: 10;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }
        .welcome-area.overlay-active {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .welcome-text {
            font-size: 26px;
            font-weight: 400;
            color: #f0e0e0;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(200, 60, 60, 0.3);
            transition: text-shadow 0.5s ease;
        }
        .welcome-area:hover .welcome-text {
            text-shadow: 0 0 28px rgba(210, 65, 65, 0.45), 0 0 50px rgba(180, 40, 40, 0.2);
        }

        .enter-btn {
            display: inline-flex;
            align-items: center;
            gap: 11px;
            padding: 11px 26px;
            background: linear-gradient(135deg, rgba(120, 28, 28, 0.4) 0%, rgba(70, 14, 14, 0.5) 100%);
            border: 1.5px solid rgba(180, 55, 55, 0.45);
            border-radius: 6px;
            color: #f0d8d8;
            font-size: 15px;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all var(--transition-smooth);
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.3);
            outline: none;
        }
        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(210, 55, 55, 0.35), rgba(255, 180, 180, 0.15), transparent);
            transition: left 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }
        .enter-btn:hover::before {
            left: 100%;
        }
        .enter-btn:hover {
            background: linear-gradient(135deg, rgba(155, 38, 38, 0.55) 0%, rgba(95, 20, 20, 0.6) 100%);
            border-color: rgba(225, 75, 75, 0.7);
            box-shadow: 0 0 22px rgba(180, 35, 35, 0.4), 0 4px 18px rgba(0, 0, 0, 0.4);
            color: #fff;
            letter-spacing: 4px;
            transform: translateY(-2px);
        }
        .enter-btn:active {
            transform: scale(0.95);
            transition: transform 0.1s ease;
            box-shadow: 0 0 8px rgba(180, 35, 35, 0.3), inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .enter-btn .arrow {
            transition: all 0.35s ease;
            position: relative;
            z-index: 1;
            font-size: 16px;
        }
        .enter-btn:hover .arrow {
            transform: translateX(5px);
            text-shadow: 0 0 8px rgba(255, 200, 200, 0.6);
        }
        .enter-btn span {
            position: relative;
            z-index: 1;
        }
        .enter-hint {
            margin-top: 9px;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            transition: color 0.4s ease;
        }
        .welcome-area:hover .enter-hint {
            color: rgba(220, 130, 130, 0.6);
        }

        /* ==================== 右下角个人信息卡（向左移动） ==================== */
        .profile-card {
            position: fixed;
            bottom: 115px;
            right: 80px;  /* 从28px改为80px，向左移动 */
            z-index: 10;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 32px 38px 28px 38px;
            min-width: 350px;
            max-width: 460px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 28px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            text-align: left;
        }
        .profile-card.overlay-active {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .profile-card:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.22);
            box-shadow: 0 8px 36px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transform: translateY(-3px);
            transition: all var(--transition-smooth);
        }

        .profile-label {
            font-family: 'VT323', "Microsoft YaHei", "PingFang SC", monospace, sans-serif;
            font-size: 15px;
            letter-spacing: 3.5px;
            color: rgba(255, 255, 255, 0.6);
            text-align: left;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .profile-name {
            font-family: 'VT323', "Microsoft YaHei", "PingFang SC", monospace, sans-serif;
            font-size: 40px;
            letter-spacing: 3px;
            color: #ffffff;
            text-align: left;
            margin-bottom: 12px;
            line-height: 1;
            text-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
        }

        .profile-desc {
            font-family: 'VT323', "Microsoft YaHei", "PingFang SC", monospace, sans-serif;
            font-size: 15px;
            letter-spacing: 2.5px;
            color: rgba(255, 255, 255, 0.6);
            text-align: left;
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .profile-info-row {
            margin-bottom: 8px;
            text-align: left;
        }
        .profile-info-row:last-child {
            margin-bottom: 0;
        }

        .profile-info-label {
            font-family: 'VT323', "Microsoft YaHei", "PingFang SC", monospace, sans-serif;
            font-size: 14px;
            letter-spacing: 3.5px;
            color: rgba(255, 255, 255, 0.5);
            text-align: left;
            text-transform: uppercase;
            display: block;
            margin-bottom: 2px;
        }

        .profile-info-value {
            font-family: 'VT323', "Microsoft YaHei", "PingFang SC", monospace, sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.9);
            text-align: left;
            line-height: 1.3;
        }

        /* ==================== 底部状态栏（左右边距对称） ==================== */
        .status-bar {
            position: fixed;
            bottom: 16px;
            left: 24px;
            right: 24px;  /* 与左侧边距完全一致，保持对称 */
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 10px;
            color: var(--text-mid);
            letter-spacing: 1.5px;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }
        .status-bar.overlay-active {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .status-bar .progress-track {
            flex: 1;
            height: 2px;
            background: rgba(80, 30, 30, 0.25);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        .status-bar .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #882222, #c84040, #e05858);
            box-shadow: 0 0 10px rgba(200, 60, 60, 0.5);
            border-radius: 2px;
            animation: pulseGlow 3s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%,
            100% {
                opacity: 0.55;
            }
            50% {
                opacity: 1;
            }
        }

        /* ==================== 右侧装饰线 ==================== */
        .side-line {
            position: fixed;
            top: 15%;
            right: 40px;
            width: 1px;
            height: 70%;
            background: linear-gradient(to bottom, transparent, rgba(120, 40, 40, 0.25), rgba(180, 50, 50, 0.15), transparent);
            z-index: 3;
            pointer-events: none;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }
        .side-line.overlay-active {
            opacity: 0;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================== 右下角控制按钮 ==================== */
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }
        .controls.overlay-active {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .control-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(180, 100, 100, 0.45);
            cursor: pointer;
            transition: all var(--transition-smooth);
            font-size: 14px;
            background: rgba(30, 8, 8, 0.4);
            border: 1px solid rgba(100, 30, 30, 0.25);
            position: relative;
            outline: none;
        }
        .control-btn:hover {
            color: #e87878;
            background: rgba(60, 15, 15, 0.6);
            border-color: rgba(180, 45, 45, 0.55);
            box-shadow: 0 0 14px rgba(180, 35, 35, 0.35), 0 0 28px rgba(150, 25, 25, 0.15);
            transform: translateY(-2px);
        }
        .control-btn:active {
            transform: scale(0.88);
            transition: transform 0.1s ease;
        }

        /* ==================== 滑动进入遮罩 ==================== */
        .slide-mask {
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #0a0505;
            z-index: 100;
            transition: left 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .slide-mask.active {
            left: 0;
        }

        /* ==================== 毛玻璃欢迎覆盖层 ==================== */
        .welcome-overlay {
            position: fixed;
            top: 0;

<body>

    <!-- 粒子背景画布 -->

    <!-- 滑动过渡遮罩 -->
    <div class="slide-mask" id="slideMask"></div>

    <script>
        // ==================== 粒子连线动画 ====================
        const canvasEl = document.getElementById('particle-canvas');
        const ctx = canvasEl.getContext('2d');

        let width, height;
        let particles = [];
        const particleCount = 80;
        const connectDistance = 150;

        function resize() {
            width = canvasEl.width = window.innerWidth;
            height = canvasEl.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.radius = Math.random() * 1.5 + 0.5;
                this.alpha = Math.random() * 0.5 + 0.3;
                this.pulseSpeed = Math.random() * 0.02 + 0.005;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }
            update(time) {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
                this.currentAlpha = this.alpha + Math.sin(time * this.pulseSpeed + this.pulsePhase) * 0.2;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(220, 90, 90, ${this.currentAlpha})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 60, 60, ${this.currentAlpha * 0.15})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < connectDistance) {
                        const alpha = (1 - dist / connectDistance) * 0.25;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(180, 60, 60, ${alpha})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
        }

        let startTime = Date.now();

        function animate() {
            const time = Date.now() - startTime;
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update(time);
                p.draw();
            });
            drawConnections();
            requestAnimationFrame(animate);
        }

        let mouseX = -1000;
        let mouseY = -1000;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            particles.forEach(p => {
                const dx = mouseX - p.x;
                const dy = mouseY - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    const force = (120 - dist) / 120 * 0.05;
                    p.vx += (dx / dist) * force;
                    p.vy += (dy / dist) * force;
                }
            });
        });

        // ==================== HTML5 Audio 音乐控制 ====================
        const bgAudio = document.getElementById('bgAudio');
        const musicPlayBtn = document.getElementById('musicPlayBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const noteIcon = musicPlayBtn.querySelector('.note-icon');

        bgAudio.volume = parseInt(volumeSlider.value) / 100;

        function updateMusicBtnUI() {
            if (bgAudio.paused) {
                musicPlayBtn.classList.remove('playing');
                noteIcon.textContent = '♫';
                musicPlayBtn.title = '播放背景音乐';
            } else {
                musicPlayBtn.classList.add('playing');
                noteIcon.textContent = '♪';
                musicPlayBtn.title = '暂停背景音乐';
            }
        }

        musicPlayBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (bgAudio.paused) {
                bgAudio.play().then(() => {
                    updateMusicBtnUI();
                }).catch(err => {
                    console.warn('音乐播放失败（可能需要用户交互）:', err.message);
                });
            } else {
                bgAudio.pause();
                updateMusicBtnUI();
            }
        });

        volumeSlider.addEventListener('input', () => {
            bgAudio.volume = parseInt(volumeSlider.value) / 100;
        });
        volumeSlider.addEventListener('change', () => {
            bgAudio.volume = parseInt(volumeSlider.value) / 100;
        });

        bgAudio.addEventListener('play', updateMusicBtnUI);
        bgAudio.addEventListener('pause', updateMusicBtnUI);
        bgAudio.addEventListener('ended', updateMusicBtnUI);
        bgAudio.addEventListener('volumechange', () => {
            const volPercent = Math.round(bgAudio.volume * 100);
            if (parseInt(volumeSlider.value) !== volPercent) {
                volumeSlider.value = volPercent;
            }
        });

        updateMusicBtnUI();

        // ==================== 页面导航 ====================
        const navDashes = document.querySelectorAll('.nav-dash');
        let currentPage = 1;
        const totalPages = navDashes.length;

        navDashes.forEach(dash => {
            dash.addEventListener('click', () => {
                const pageNum = parseInt(dash.getAttribute('data-page'));
                if (pageNum === currentPage) return;
                navDashes.forEach(d => d.classList.remove('active'));
                dash.classList.add('active');
                currentPage = pageNum;
                document.getElementById('pageNavIndicator').title =
                    `页面导航 · 当前第${currentPage}页 / 共${totalPages}页`;
                navDashes.forEach(d => {
                    const p = parseInt(d.getAttribute('data-page'));
                    d.title = p === currentPage ?
                        `场景 ${String(p).padStart(2, '0')} · 当前` :
                        `场景 ${String(p).padStart(2, '0')}`;
                });
                const statusSpan = document.querySelector('.status-bar span');
                if (statusSpan) {
                    statusSpan.textContent =
                        `SCENCE ${String(currentPage).padStart(2, '0')} 主 IDLE LOOP`;
                }
                console.log(`导航到第 ${currentPage} 页（共 ${totalPages} 页）`);
            });
        });

        // ==================== 覆盖层 + 所有UI元素联动 ====================
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const enterMainBtn = document.getElementById('enterMainBtn');
        const topRightPanel = document.getElementById('topRightPanel');
        const welcomeArea = document.getElementById('welcomeArea');
        const logoEl = document.querySelector('.logo');
        const statusBarEl = document.querySelector('.status-bar');
        const controlsEl = document.querySelector('.controls');
        const sideLineEl = document.querySelector('.side-line');
        const profileCardEl = document.getElementById('profileCard');

        // 所有需要在overlay期间隐藏的UI元素
        const allUiElements = [
            logoEl,
            topRightPanel,
            welcomeArea,
            statusBarEl,
            controlsEl,
            sideLineEl,
            profileCardEl
        ];

        // 显示覆盖层（淡入 1s），确保所有UI元素隐藏
        function showWelcomeOverlay() {
            if (
                welcomeOverlay &&
                !welcomeOverlay.classList.contains('visible') &&
                !welcomeOverlay.classList.contains('fading-out')
            ) {
                // 覆盖层淡入
                welcomeOverlay.classList.add('visible');
                // 确保所有UI元素都隐藏
                allUiElements.forEach(el => {
                    if (el && !el.classList.contains('overlay-active')) {
                        el.classList.add('overlay-active');
                    }
                });
            }
        }

        // 页面加载后 1.6s 显示覆盖层
        window.addEventListener('load', () => {
            setTimeout(showWelcomeOverlay, 300);
        });
        if (document.readyState === 'complete') {
            setTimeout(showWelcomeOverlay, 300);
        }

        // 点击"点击进入主页" → 覆盖层淡出 1s + 所有UI元素淡入 1s
        enterMainBtn.addEventListener('click', () => {
            if (welcomeOverlay.classList.contains('visible')) {
                // 覆盖层淡出
                welcomeOverlay.classList.remove('visible');
                welcomeOverlay.classList.add('fading-out');
                // 所有UI元素淡入（移除隐藏类）
                allUiElements.forEach(el => {
                    if (el) {
                        el.classList.remove('overlay-active');
                    }
                });

                // 1s 后移除 fading-out 类
                setTimeout(() => {
                    welcomeOverlay.classList.remove('fading-out');
                }, 1000);

                // 用户交互后播放背景音乐
                bgAudio.play().then(() => {
                    updateMusicBtnUI();
                    console.log('🎵 背景音乐开始播放');
                }).catch(err => {
                    console.warn('音乐播放失败:', err.message);
                });

                console.log('欢迎覆盖层已关闭，所有UI元素已淡入，进入主页。');
            }
        });

        // ==================== 滑动进入交互 ====================
        const enterBtn = document.getElementById('enterBtn');
        const slideMask = document.getElementById('slideMask');

        let touchStartX = 0;
        let touchDragging = false;

        enterBtn.addEventListener('click', () => {
            enterSite();
        });
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchDragging = true;
        });
        document.addEventListener('touchend', (e) => {
            if (!touchDragging) return;
            const endX = e.changedTouches[0].clientX;
            if (endX - touchStartX > 80) {
                enterSite();
            }
            touchDragging = false;
        });

        let mouseStartX = 0;
        let mouseDown = false;
        document.addEventListener('mousedown', (e) => {
            mouseStartX = e.clientX;
            mouseDown = true;
        });
        document.addEventListener('mouseup', (e) => {
            if (!mouseDown) return;
            if (e.clientX - mouseStartX > 100) {
                enterSite();
            }
            mouseDown = false;
        });

        function enterSite() {
            slideMask.classList.add('active');
            if (bgAudio.paused) {
                bgAudio.play().then(updateMusicBtnUI).catch(() => {});
            }
            setTimeout(() => {
                console.log('滑动进入主页');
            }, 800);
        }

        // ==================== 键盘快捷键 ====================
        document.addEventListener('keydown', (e) => {
            // 如果覆盖层正在显示，忽略快捷键（避免在入场动画期间操作）
            if (welcomeOverlay.classList.contains('visible')) {
                return;
            }
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                if (bgAudio.paused) {
                    bgAudio.play().then(updateMusicBtnUI).catch(() => {});
                } else {
                    bgAudio.pause();
                    updateMusicBtnUI();
                }
            }
            if (e.code === 'ArrowUp' && e.target === document.body) {
                e.preventDefault();
                const newVol = Math.min(100, parseInt(volumeSlider.value) + 5);
                volumeSlider.value = newVol;
                bgAudio.volume = newVol / 100;
            }
            if (e.code === 'ArrowDown' && e.target === document.body) {
                e.preventDefault();
                const newVol = Math.max(0, parseInt(volumeSlider.value) - 5);
                volumeSlider.value = newVol;
                bgAudio.volume = newVol / 100;
            }
            if (e.code === 'ArrowRight' && e.target === document.body && currentPage < totalPages) {
                e.preventDefault();
                const nextDash = document.querySelector(`.nav-dash[data-page="${currentPage + 1}"]`);
                if (nextDash) nextDash.click();
            }
            if (e.code === 'ArrowLeft' && e.target === document.body && currentPage > 1) {
                e.preventDefault();
                const prevDash = document.querySelector(`.nav-dash[data-page="${currentPage - 1}"]`);
                if (prevDash) prevDash.click();
            }
        });

        // ==================== 初始化 ====================
        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });
        resize();
        initParticles();
        animate();

        console.log('🖤 LuHe / miao~ 主页已就绪');
        console.log('  初始状态：仅显示背景（粒子/网格/暗角）');
        console.log('  1.6s 后显示欢迎覆盖层（"别来无恙啊"）');
        console.log('  点击"进入主页"后：覆盖层淡出，所有UI元素淡入');
        console.log('  右上角 · 音乐控制器 | 页面导航');
        console.log('  右下角 · 个人信息卡（PROFILE）- 已向左移动');
        console.log('  底部状态栏 · 左右边距已对称');
        console.log('  快捷键：空格=播放/暂停 | ↑↓=音量 | ←→=切换页面');
        console.log('  覆盖层淡入/淡出 1s · UI元素联动淡入/淡出 1s');
        console.log('  音乐系统：HTML5 Audio（替换 src 即可使用自己的音乐）');
        console.log('  英文字体：VT323（等宽像素风格）');
    </script>
</body>
</html>
